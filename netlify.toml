[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to the live backend
# REPLACE 'https://passagr-backend.up.railway.app' with your actual backend URL
[[redirects]]
  from = "/api/*"
  to = "https://passagr-backend.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/public/*"
  to = "https://passagr-backend.up.railway.app/public/:splat"
  status = 200
  force = true

# Catch-all for SPA routing (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
