[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[[redirects]]
  from = "/api/*"
  to = "https://passagr-backend.up.railway.app/api/:splat"
  status = 200
  force = true

# Netlify Function for countries data required by the map overlay
[[redirects]]
  from = "/public/countries"
  to = "/.netlify/functions/public-countries"
  status = 200
  force = true

# Catch-all for SPA routing (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
